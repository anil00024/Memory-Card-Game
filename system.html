<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Card Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <h1>Memory Card Game</h1>
        
        <div class="game-info">
            <div class="info-item">
                <span class="info-value" id="moves">0</span>
                <span class="info-label">Moves</span>
            </div>
            <div class="info-item">
                <span class="info-value" id="timer">00:00</span>
                <span class="info-label">Time</span>
            </div>
            <div class="info-item">
                <span class="info-value" id="score">0</span>
                <span class="info-label">Score</span>
            </div>
        </div>
        
        <div id="memory-grid" class="memory-grid"></div>
        
        <div class="controls">
            <button id="new-game-btn">New Game</button>
        </div>
        
        <div class="difficulty-controls">
            <button class="difficulty-btn active" data-size="4" data-difficulty="easy">Easy (4×4)</button>
            <button class="difficulty-btn" data-size="6" data-difficulty="medium">Medium (6×6)</button>
            <button class="difficulty-btn" data-size="8" data-difficulty="hard">Hard (8×8)</button>
        </div>
        
        <div class="theme-controls">
            <h3>Select Theme</h3>
            <div class="theme-buttons">
                <button class="theme-btn active" data-theme="animals">Animals</button>
                <button class="theme-btn" data-theme="food">Food</button>
                <button class="theme-btn" data-theme="sports">Sports</button>
                <button class="theme-btn" data-theme="space">Space</button>
            </div>
        </div>
    </div>
    
    <div id="congratulations-modal" class="modal">
        <div class="modal-content">
            <div class="modal-stars">
                <div class="star">⭐</div>
                <div class="star">⭐</div>
                <div class="star">⭐</div>
            </div>
            <h2>Congratulations! 🎉</h2>
            <p>You successfully matched all pairs!</p>
            <div class="stats">
                <p>Difficulty: <span id="final-difficulty"></span></p>
                <p>Moves: <span id="final-moves"></span></p>
                <p>Time: <span id="final-time"></span></p>
                <p>Your Score: <span id="final-score" class="score"></span></p>
            </div>
            <button id="play-again-btn">Play Again</button>
        </div>
    </div>

    <script src="data.js"></script>
</body>
</html>
